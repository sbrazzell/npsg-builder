    <rect x="430" y="195" width="240" height="220" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  </g>
  <text x="550" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">Facility</text>
  <text x="550" y="236" text-anchor="middle" font-size="10" fill="#94a3b8">CENTRAL HUB</text>
  <line x1="440" y1="243" x2="660" y2="243" stroke="#334155" stroke-width="1"/>
  <text x="550" y="257" text-anchor="middle" font-size="10" fill="#cbd5e1">id · organizationId</text>
  <text x="550" y="271" text-anchor="middle" font-size="10" fill="#cbd5e1">facilityName · address</text>
  <text x="550" y="285" text-anchor="middle" font-size="10" fill="#94a3b8">occupancyNotes</text>
  <text x="550" y="299" text-anchor="middle" font-size="10" fill="#94a3b8">populationServed</text>
  <text x="550" y="313" text-anchor="middle" font-size="10" fill="#94a3b8">daysHoursOfOperation</text>
  <text x="550" y="327" text-anchor="middle" font-size="10" fill="#94a3b8">childrensAreasNotes</text>
  <text x="550" y="341" text-anchor="middle" font-size="10" fill="#94a3b8">parkingLotNotes</text>
  <text x="550" y="355" text-anchor="middle" font-size="10" fill="#94a3b8">surroundingAreaNotes</text>
  <text x="550" y="369" text-anchor="middle" font-size="10" fill="#94a3b8">publicAccessNotes</text>
  <text x="550" y="383" text-anchor="middle" font-size="10" fill="#94a3b8">knownSecurityConcerns</text>
  <text x="550" y="397" text-anchor="middle" font-size="10" fill="#94a3b8">notes · createdAt · updatedAt</text>

  <!-- ─────────── LEFT SPOKES ─────────── -->

  <!-- ThreatAssessment -->
  <g filter="url(#shadow)">
    <rect x="110" y="210" width="210" height="110" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  </g>
  <text x="215" y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">ThreatAssessment</text>
  <line x1="120" y1="240" x2="310" y2="240" stroke="#fed7aa" stroke-width="1"/>
  <text x="215" y="254" text-anchor="middle" font-size="10" fill="#9a3412">id · facilityId</text>
  <text x="215" y="268" text-anchor="middle" font-size="10" fill="#9a3412">threatType · description</text>
  <text x="215" y="282" text-anchor="middle" font-size="10" fill="#9a3412">likelihood · impact</text>
  <text x="215" y="296" text-anchor="middle" font-size="10" fill="#9a3412">vulnerabilityNotes</text>
  <text x="215" y="310" text-anchor="middle" font-size="10" fill="#9a3412">incidentHistory</text>

  <!-- ExistingSecurityMeasure -->
  <g filter="url(#shadow)">
