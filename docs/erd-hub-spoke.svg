  <text x="550" y="602" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">ApplicationPacket</text>
  <line x1="440" y1="610" x2="660" y2="610" stroke="#bae6fd" stroke-width="1"/>
  <text x="550" y="624" text-anchor="middle" font-size="10" fill="#075985">id · facilityId · title</text>
  <text x="550" y="638" text-anchor="middle" font-size="10" fill="#075985">summary · status</text>
  <text x="550" y="652" text-anchor="middle" font-size="10" fill="#075985">createdAt · updatedAt</text>

  <!-- ─────────── RIGHT SPOKES ─────────── -->

  <!-- ProjectProposal -->
  <g filter="url(#shadow)">
