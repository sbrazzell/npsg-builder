  <line x1="60" y1="345" x2="225" y2="345" stroke="#bbf7d0" stroke-width="1"/>
  <text x="142" y="359" text-anchor="middle" font-size="10" fill="#166534">id · facilityId</text>
  <text x="142" y="373" text-anchor="middle" font-size="10" fill="#166534">category · description</text>
  <text x="142" y="387" text-anchor="middle" font-size="10" fill="#166534">effectivenessRating</text>
  <text x="142" y="401" text-anchor="middle" font-size="10" fill="#166534">gapsRemaining</text>

  <!-- SiteObservation -->
  <g filter="url(#shadow)">
    <rect x="85" y="430" width="175" height="95" rx="8" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  </g>
  <text x="172" y="452" text-anchor="middle" font-size="12" font-weight="700" fill="#7e22ce">SiteObservation</text>
  <line x1="95" y1="460" x2="250" y2="460" stroke="#e9d5ff" stroke-width="1"/>
  <text x="172" y="474" text-anchor="middle" font-size="10" fill="#6b21a8">id · facilityId · title</text>
  <text x="172" y="488" text-anchor="middle" font-size="10" fill="#6b21a8">locationDescription</text>
  <text x="172" y="502" text-anchor="middle" font-size="10" fill="#6b21a8">observationType · severity</text>
  <text x="172" y="516" text-anchor="middle" font-size="10" fill="#6b21a8">photoFilename</text>

  <!-- NarrativeDraft -->
  <g filter="url(#shadow)">
    <rect x="160" y="540" width="175" height="85" rx="8" fill="#fffbeb" stroke="#eab308" stroke-width="1.5"/>
  </g>
