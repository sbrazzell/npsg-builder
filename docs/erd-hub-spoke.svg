  <line x1="830" y1="270" x2="1020" y2="270" stroke="#fecaca" stroke-width="1"/>
  <text x="925" y="284" text-anchor="middle" font-size="10" fill="#991b1b">id · facilityId · title</text>
  <text x="925" y="298" text-anchor="middle" font-size="10" fill="#991b1b">category · problemStatement</text>
  <text x="925" y="312" text-anchor="middle" font-size="10" fill="#991b1b">proposedSolution</text>
  <text x="925" y="326" text-anchor="middle" font-size="10" fill="#991b1b">riskReductionRationale</text>
  <text x="925" y="340" text-anchor="middle" font-size="10" fill="#991b1b">priority · status</text>
  <text x="925" y="354" text-anchor="middle" font-size="10" fill="#991b1b">implementationNotes</text>

  <!-- GrantAnalysis -->
  <g filter="url(#shadow)">
    <rect x="820" y="405" width="210" height="120" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <text x="925" y="427" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">GrantAnalysis</text>
  <line x1="830" y1="435" x2="1020" y2="435" stroke="#a7f3d0" stroke-width="1"/>
  <text x="925" y="449" text-anchor="middle" font-size="10" fill="#064e3b">id · facilityId</text>
  <text x="925" y="463" text-anchor="middle" font-size="10" fill="#064e3b">overallScore</text>
  <text x="925" y="477" text-anchor="middle" font-size="10" fill="#064e3b">riskClarityScore</text>
  <text x="925" y="491" text-anchor="middle" font-size="10" fill="#064e3b">vulnerabilitySpecificityScore</text>
  <text x="925" y="505" text-anchor="middle" font-size="10" fill="#064e3b">projectAlignmentScore</text>
  <text x="925" y="519" text-anchor="middle" font-size="10" fill="#064e3b">budgetDefensibilityScore</text>

  <!-- ─────────── SECOND-LEVEL NODES ─────────── -->

  <!-- BudgetItem -->
  <g filter="url(#shadow)">
    <rect x="1000" y="175" width="88" height="95" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5"/>
  </g>
  <text x="1044" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">BudgetItem</text>
  <line x1="1008" y1="204" x2="1080" y2="204" stroke="#fda4af" stroke-width="1"/>
  <text x="1044" y="218" text-anchor="middle" font-size="9" fill="#9f1239">id · projectId</text>
  <text x="1044" y="230" text-anchor="middle" font-size="9" fill="#9f1239">itemName</text>
  <text x="1044" y="242" text-anchor="middle" font-size="9" fill="#9f1239">quantity · unitCost</text>
  <text x="1044" y="254" text-anchor="middle" font-size="9" fill="#9f1239">totalCost</text>
  <text x="1044" y="266" text-anchor="middle" font-size="9" fill="#9f1239">vendorName</text>

  <!-- ProjectThreatLink -->
  <g filter="url(#shadow)">
    <rect x="1000" y="355" width="88" height="70" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <text x="1044" y="375" text-anchor="middle" font-size="10" font-weight="700" fill="#5b21b6">ProjectThreat</text>
  <text x="1044" y="387" text-anchor="middle" font-size="10" font-weight="700" fill="#5b21b6">Link</text>
  <line x1="1008" y1="394" x2="1080" y2="394" stroke="#ddd6fe" stroke-width="1"/>
  <text x="1044" y="407" text-anchor="middle" font-size="9" fill="#4c1d95">id · projectId</text>
  <text x="1044" y="419" text-anchor="middle" font-size="9" fill="#4c1d95">threatId</text>

  <!-- GrantAnalysisFlag -->
  <g filter="url(#shadow)">
    <rect x="1000" y="500" width="88" height="80" rx="8" fill="#fff7f0" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="1044" y="521" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">GrantAnalysis</text>
  <text x="1044" y="533" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Flag</text>
  <line x1="1008" y1="541" x2="1080" y2="541" stroke="#fde68a" stroke-width="1"/>
  <text x="1044" y="554" text-anchor="middle" font-size="9" fill="#78350f">id · analysisId</text>
  <text x="1044" y="566" text-anchor="middle" font-size="9" fill="#78350f">severity · category</text>
  <text x="1044" y="578" text-anchor="middle" font-size="9" fill="#78350f">title · explanation</text>

  <!-- ProjectAnalysisSnapshot -->
  <g filter="url(#shadow)">
    <rect x="1000" y="570" width="88" height="80" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  </g>
  <text x="1044" y="591" text-anchor="middle" font-size="10" font-weight="700" fill="#0f766e">ProjectAnalysis</text>
  <text x="1044" y="603" text-anchor="middle" font-size="10" font-weight="700" fill="#0f766e">Snapshot</text>
  <line x1="1008" y1="611" x2="1080" y2="611" stroke="#99f6e4" stroke-width="1"/>
  <text x="1044" y="624" text-anchor="middle" font-size="9" fill="#115e59">id · analysisId</text>
  <text x="1044" y="636" text-anchor="middle" font-size="9" fill="#115e59">projectId · score</text>
  <text x="1044" y="648" text-anchor="middle" font-size="9" fill="#115e59">findingsJson</text>

  <!-- ─────────── LEGEND ─────────── -->
  <rect x="30" y="680" width="350" height="110" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="205" y="700" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">Legend</text>
  <rect x="45" y="710" width="14" height="14" rx="3" fill="#1e293b"/>
  <text x="65" y="722" font-size="10" fill="#475569">Central Hub / Fact Table (Facility)</text>
  <rect x="45" y="730" width="14" height="14" rx="3" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="65" y="742" font-size="10" fill="#475569">Parent Entity (Organization)</text>
  <rect x="45" y="750" width="14" height="14" rx="3" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="65" y="762" font-size="10" fill="#475569">Direct Dimension (speaks off Facility)</text>
  <rect x="45" y="770" width="14" height="14" rx="3" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="65" y="782" font-size="10" fill="#475569">Second-level (child of dimension)</text>
  <line x1="45" y1="797" x2="59" y2="797" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="65" y="800" font-size="10" fill="#475569">Cross-reference link (ProjectThreatLink ↔ ThreatAssessment)</text>

</svg>
