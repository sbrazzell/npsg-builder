<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" width="1100" height="820" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="#f8fafc"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">NSGP Builder — Entity Relationship Diagram</text>
  <text x="550" y="50" text-anchor="middle" font-size="11" fill="#64748b">Hub &amp; Spoke / Fact–Dimension Model</text>

  <!-- ─────────── CONNECTOR LINES ─────────── -->

  <!-- Organization → Facility -->
  <line x1="550" y1="145" x2="550" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Facility → ThreatAssessment (left-upper) -->
  <line x1="490" y1="310" x2="320" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Facility → ExistingSecurityMeasure (left) -->
  <line x1="460" y1="340" x2="230" y2="360" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Facility → SiteObservation (left-lower) -->
  <line x1="470" y1="375" x2="255" y2="470" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Facility → NarrativeDraft (bottom-left) -->
  <line x1="500" y1="400" x2="320" y2="560" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Facility → ApplicationPacket (bottom) -->
  <line x1="550" y1="410" x2="550" y2="580" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Facility → ProjectProposal (right) -->
  <line x1="640" y1="340" x2="820" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Facility → GrantAnalysis (right-lower) -->
  <line x1="630" y1="375" x2="820" y2="450" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ProjectProposal → BudgetItem -->
  <line x1="930" y1="305" x2="1005" y2="230" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- ProjectProposal → ProjectThreatLink -->
  <line x1="930" y1="320" x2="1005" y2="385" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GrantAnalysis → GrantAnalysisFlag -->
  <line x1="930" y1="460" x2="1000" y2="530" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- GrantAnalysis → ProjectAnalysisSnapshot -->
  <line x1="930" y1="475" x2="1000" y2="600" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ProjectThreatLink ← ThreatAssessment (dashed cross-link) -->
  <line x1="320" y1="258" x2="1005" y2="388" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ─────────── ORGANIZATION (parent) ─────────── -->
  <g filter="url(#shadow)">
    <rect x="430" y="75" width="240" height="70" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  </g>
  <text x="550" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">Organization</text>
  <line x1="440" y1="115" x2="660" y2="115" stroke="#a5b4fc" stroke-width="1"/>
  <text x="550" y="128" text-anchor="middle" font-size="10" fill="#4338ca">id · name · denomination</text>
  <text x="550" y="140" text-anchor="middle" font-size="10" fill="#4338ca">address · contactEmail · einOrTaxId</text>

  <!-- ─────────── FACILITY (hub / fact) ─────────── -->
