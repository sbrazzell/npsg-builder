  <line x1="170" y1="570" x2="325" y2="570" stroke="#fde68a" stroke-width="1"/>
  <text x="247" y="584" text-anchor="middle" font-size="10" fill="#78350f">id · facilityId</text>
  <text x="247" y="598" text-anchor="middle" font-size="10" fill="#78350f">sectionName · promptContext</text>
  <text x="247" y="612" text-anchor="middle" font-size="10" fill="#78350f">generatedText · editedText</text>

  <!-- ApplicationPacket -->
  <g filter="url(#shadow)">
    <rect x="430" y="580" width="240" height="80" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/>
